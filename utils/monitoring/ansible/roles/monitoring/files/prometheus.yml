global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

scrape_configs:
  - job_name: 'mgmt'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'ccmall-Web'
    static_configs:
      - targets: ['10.0.1.10:9100']

  - job_name: 'onprem-db'
    static_configs:
      - targets: ['172.16.8.201:9100']  # 172.16.8.201로 수정

  - job_name: 'ccmall-Rec'
    static_configs:
      - targets: ['10.0.2.30:9100']  # EC2 Rec warm standby
