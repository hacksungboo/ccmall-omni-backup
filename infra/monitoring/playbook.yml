---
# mgmt에는 github action runners에서가 아니라, mgmt에서 직접 설치
# - name: 모니터링 설치 (Prometheus + Grafana + Alertmanager)
#   hosts: mgmt
#   become: yes
#   roles:
#     - monitoring

- name: Node Exporter 설치 (전체 서버)
  hosts: "ccmall-Web:ccmall-Rec" 
  become: yes
  tasks:
    - name: 필수 패키지 설치 (Rocky/Amazon Linux)
      dnf:
        name:
          - tar
          - gzip
        state: present
      when: ansible_os_family == "RedHat"

    - name: 필수 패키지 설치 (Ubuntu)
      apt:
        name:
          - tar
          - gzip
        state: present
        update_cache: yes
      when: ansible_os_family == "Debian"

    - name: Node Exporter 다운로드
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"

    - name: 압축 풀기
      unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: 실행 파일 이동
      copy:
        src: "/tmp/node_exporter-1.7.0.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: '0755'
        remote_src: yes

    - name: Node Exporter 서비스 등록
      copy:
        dest: "/etc/systemd/system/node_exporter.service"
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target
          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          [Install]
          WantedBy=multi-user.target

    - name: Node Exporter 서비스 시작
      systemd:
        name: node_exporter
        state: restarted
        enabled: yes
        daemon_reload: yes
