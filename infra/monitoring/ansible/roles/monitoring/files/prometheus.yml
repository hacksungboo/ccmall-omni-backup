global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - localhost:9093

scrape_configs:
  - job_name: 'mgmt'
    static_configs:
      - targets: ['localhost:9100']

  - job_name: 'web'
    static_configs:
      - targets: ['10.0.1.10:9100']

  - job_name: 'onprem-db'
    static_configs:
      - targets: ['172.16.8.201:9100']  # 172.16.8.201로 수정

  - job_name: 'ec2-db-1'
    static_configs:
      - targets: ['10.0.2.30:9100']  # EC2 Rec warm standby

  - job_name: 'ec2-db-2'
    static_configs:
      - targets: ['10.0.2.40:9100']  # 장애시 동적 생성