---
- name: (ccmall_web) nginx + HTTPS (Let's Encrypt) 배포
  block:
    - name: nginx 설치
      dnf:
        name: nginx
        state: present

    - name: nginx 기본 설정 제거
      file:
        path: /etc/nginx/conf.d/default.conf
        state: absent

    - name: nginx HTTP 설정 배포 (certbot 검증용)
      template:
        src: ccmall.conf.j2
        dest: /etc/nginx/conf.d/ccmall.conf
        mode: "0644"

    - name: nginx 설정 문법 검사
      command: nginx -t
      changed_when: false

    - name: nginx 실행
      systemd:
        name: nginx
        enabled: true
        state: restarted

    - name: HTTP/HTTPS 방화벽 허용
      firewalld:
        service: "{{ item }}"
        permanent: true
        state: enabled
        immediate: true
      loop:
        - http
        - https
      ignore_errors: yes

    - name: certbot 설치
      dnf:
        name:
          - certbot
          - python3-certbot-nginx
        state: present

    - name: Let's Encrypt 인증서 발급 + HTTPS 자동 적용
      command: >
        certbot --nginx
        -d {{ ccmall_domain }}
        --non-interactive
        --agree-tos
        -m {{ certbot_email }}
        --redirect
      args:
        creates: "/etc/letsencrypt/live/{{ ccmall_domain }}/fullchain.pem"

  when: inventory_hostname == 'ccmall-Web'