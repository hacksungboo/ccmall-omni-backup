- name: PostgreSQL 설치 및 S3 복구 + Tailscale 연결
  hosts: all
  become: true

  vars:
    db_name: "ccmall_db"
    db_user: "ccmall_user"
    db_password: "user1"
    rec_db_host: "10.0.2.30"

  tasks:
    - name: 1. PostgreSQL 설치
      dnf:
        name: [postgresql15, postgresql15-server, awscli]
        state: present

    - name: 2. PostgreSQL 초기화
      shell: postgresql-setup --initdb
      args:
        creates: /var/lib/pgsql/data/postgresql.conf

    - name: 3. PostgreSQL 서비스 시작
      systemd:
        name: postgresql
        state: started
        enabled: true

    - name: 4. listen_addresses 설정
      lineinfile:
        path: /var/lib/pgsql/data/postgresql.conf
        regexp: '^#?listen_addresses'
        line: "listen_addresses='*'"

    - name: 5. pg_hba.conf 허용 추가
      lineinfile:
        path: /var/lib/pgsql/data/pg_hba.conf
        line: "host all all 0.0.0.0/0 md5"

    - name: 6. PostgreSQL 재시작
      systemd:
        name: postgresql
        state: restarted

    - name: 7. DB User 생성
      become_user: postgres
      shell: |
        psql -c "CREATE USER {{ db_user }} WITH PASSWORD '{{ db_password }}';" || true

    - name: 8. Database 생성
      become_user: postgres
      shell: |
        psql -lqt | cut -d \| -f 1 | grep -qw {{ db_name }} || \
        createdb -O {{ db_user }} {{ db_name }}

    - name: 9. S3에서 최신 백업 파일 검색 및 다운로드
      shell: |
        LATEST_KEY=$(aws s3 ls s3://{{ s3_bucket_name }}/backups/ --recursive \
          | sort \
          | tail -n 1 \
          | awk '{print $4}')
        if [ -z "$LATEST_KEY" ]; then
          echo "S3에서 백업 파일을 찾을 수 없습니다." >&2
          exit 1
        fi
        echo "복구 대상 파일: $LATEST_KEY"
        aws s3 cp s3://{{ s3_bucket_name }}/$LATEST_KEY /tmp/full_db_backup.sql
      args:
        executable: /bin/bash

    - name: 10. 백업 파일 권한 설정
      file:
        path: "/tmp/full_db_backup.sql"
        owner: postgres
        group: postgres
        mode: '0644'

    - name: 11. PostgreSQL 데이터 복구
      become_user: postgres
      shell: |
        psql {{ db_name }} < /tmp/full_db_backup.sql

    - name: 12. Tailscale 설치
      shell: curl -fsSL https://tailscale.com/install.sh | sh
      args:
        creates: /usr/bin/tailscale

    - name: 13. tailscaled 서비스 시작
      systemd:
        name: tailscaled
        state: started
        enabled: true

    - name: 14. Tailscale VPN 연결
      shell: tailscale up --authkey {{ tailscale_auth_key }} --accept-dns=false
      async: 60
      poll: 0 

    - name: 15. Node Exporter 다운로드
      get_url:
        url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
        dest: "/tmp/node_exporter.tar.gz"

    - name: 16. 압축 풀기
      unarchive:
        src: "/tmp/node_exporter.tar.gz"
        dest: "/tmp"
        remote_src: yes

    - name: 17. 실행 파일 이동
      copy:
        src: "/tmp/node_exporter-1.7.0.linux-amd64/node_exporter"
        dest: "/usr/local/bin/node_exporter"
        mode: '0755'
        remote_src: yes

    - name: 18. Node Exporter 서비스 등록
      copy:
        dest: "/etc/systemd/system/node_exporter.service"
        content: |
          [Unit]
          Description=Node Exporter
          After=network.target
          [Service]
          User=root
          ExecStart=/usr/local/bin/node_exporter
          Restart=always
          [Install]
          WantedBy=multi-user.target

    - name: 19. Node Exporter 시작
      systemd:
        name: node_exporter
        state: started
        enabled: yes
        daemon_reload: yes

    - name: 20. EC2-Rec 현재 DB 동기화 및 무결성 검증
      become_user: postgres
      shell: |
        set -e

        echo "=== EC2-Rec({{ rec_db_host }}) 연결 확인 ==="
        if ! timeout 5 bash -c 'echo > /dev/tcp/{{ rec_db_host }}/5432' 2>/dev/null; then
          echo "[오류] EC2-Rec PostgreSQL(5432) 연결 불가 - 보안 그룹 또는 서비스 확인 필요" >&2
          exit 1
        fi

        echo "=== EC2-Rec({{ rec_db_host }}) 현재 DB 덤프 ==="
        PGPASSWORD={{ db_password }} PGCONNECT_TIMEOUT=10 pg_dump \
          -h {{ rec_db_host }} \
          -U {{ db_user }} \
          -d {{ db_name }} \
          --no-owner \
          --no-acl \
          -f /tmp/rec_live.sql

        if [ ! -s /tmp/rec_live.sql ]; then
          echo "[오류] pg_dump 실패 - 파일이 없거나 비어있음" >&2
          exit 1
        fi

        echo "=== ccmall-Recovery-ec2 DB 재적재 ==="
        psql {{ db_name }} -c "
          DROP SCHEMA public CASCADE;
          CREATE SCHEMA public;
          GRANT ALL ON SCHEMA public TO {{ db_user }};
          GRANT ALL ON SCHEMA public TO public;
        "
        psql {{ db_name }} < /tmp/rec_live.sql
        rm -f /tmp/rec_live.sql

        echo "=== 무결성 검증 ==="
        FAILED=0
        for TABLE in customers inventorys orders admins; do
          COUNT=$(psql -d {{ db_name }} -tAc "SELECT COUNT(*) FROM $TABLE;" 2>/dev/null)
          if [ $? -ne 0 ]; then
            echo "[오류] 테이블 없음: $TABLE" >&2
            FAILED=1
          else
            echo "[검증] $TABLE: ${COUNT}건"
          fi
        done

        if [ $FAILED -eq 1 ]; then
          echo "무결성 검증 실패 - database.py 전환 중단" >&2
          exit 1
        fi
        echo "동기화 및 무결성 검증 완료"
      args:
        executable: /bin/bash

    - name: 21. ccmall-Web DB_HOST를 Recovery EC2(10.0.2.40)로 전환
      delegate_to: localhost
      become: false
      shell: |
        ssh -i ../deployment/terraform/ccmall-key.pem \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ec2-user@{{ web_host }} \
            "sudo sed -i 's/^DB_HOST=.*/DB_HOST=10.0.2.40/' /etc/ccmall/ccmall.env && sudo systemctl restart nginx"

