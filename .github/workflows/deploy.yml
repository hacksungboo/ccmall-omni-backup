# .github/workflows/deploy.yml
# CI/CD 테스트
name: "Infra Deploy"

on:
  pull_request:
    branches: ["master"]
    paths:
      - "infra/**"
  push:
    branches: ["master"]
    paths:
      - "infra/**"

permissions:
  contents: read
  pull-requests: write

jobs:
  plan:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init & plan
        working-directory: infra/deployment/terraform
        run: |
          terraform init
          terraform plan -no-color 2>&1 | tee plan_output.txt

      - name: Post Plan to PR comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.TOKEN_GITHUB }}
          script: |
            const fs = require('fs');
            // 파일 경로는 checkout한 최상단 폴더 기준이므로 주의
            const plan = fs.readFileSync('infra/deployment/terraform/plan_output.txt', 'utf8');
            const output = `### 📋 Terraform Plan 결과\n\`\`\`text\n${plan}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  deploy:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_onprem_cidr: ${{ secrets.TF_VAR_ONPREM_CIDR }}
      TF_VAR_tailnet_name: ${{ secrets.TF_VAR_TAILNET_NAME }}
      TF_VAR_tailscale_api_key: ${{ secrets.TF_VAR_TAILSCALE_API_KEY }}
      TF_VAR_s3_bucket_prefix: ${{ secrets.TF_VAR_S3_BUCKET_PREFIX }}
      TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_VPC_CIDR }}
      TF_VAR_public_subnet_cidr: ${{ secrets.TF_VAR_PUBLIC_SUBNET_CIDR }}
      TF_VAR_private_subnet_cidr: ${{ secrets.TF_VAR_PRIVATE_SUBNET_CIDR }}
      TF_VAR_ssh_allowed_cidr: ${{ secrets.TF_VAR_SSH_ALLOWED_CIDR }}
      TF_VAR_web_allowed_cidr: ${{ secrets.TF_VAR_WEB_ALLOWED_CIDR }}
      TF_VAR_web_node_exporter_allowed_cidr: ${{ secrets.TF_VAR_WEB_NODE_EXPORTER_ALLOWED_CIDR }}
      TF_VAR_mgmt_cidr: ${{ secrets.TF_VAR_MGMT_CIDR }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_name: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_NAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init & apply
        working-directory: infra/deployment/terraform
        run: |
          terraform init
          terraform apply --auto-approve -var-file=dev.tfvars     

