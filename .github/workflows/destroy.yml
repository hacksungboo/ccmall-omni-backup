# .github/workflows/destroy.yml

name: "Terraform Destroy"

on:
  workflow_dispatch: # GitHub Actions 탭에서 수동 실행 버튼 생성

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_onprem_cidr: ${{ secrets.TF_VAR_ONPREM_CIDR }}
      TF_VAR_tailnet_name: ${{ secrets.TF_VAR_TAILNET_NAME }}
      TF_VAR_tailscale_api_key: ${{ secrets.TF_VAR_TAILSCALE_API_KEY }}
      TF_VAR_s3_bucket_prefix: ${{ secrets.TF_VAR_S3_BUCKET_PREFIX }}
      TF_VAR_vpc_cidr: ${{ secrets.TF_VAR_VPC_CIDR }}
      TF_VAR_public_subnet_cidr: ${{ secrets.TF_VAR_PUBLIC_SUBNET_CIDR }}
      TF_VAR_private_subnet_cidr: ${{ secrets.TF_VAR_PRIVATE_SUBNET_CIDR }}
      TF_VAR_ssh_allowed_cidr: ${{ secrets.TF_VAR_SSH_ALLOWED_CIDR }}
      TF_VAR_web_allowed_cidr: ${{ secrets.TF_VAR_WEB_ALLOWED_CIDR }}
      TF_VAR_web_node_exporter_allowed_cidr: ${{ secrets.TF_VAR_WEB_NODE_EXPORTER_ALLOWED_CIDR }}
      TF_VAR_mgmt_cidr: ${{ secrets.TF_VAR_MGMT_CIDR }}
      TF_VAR_cloudflare_api_token: ${{ secrets.TF_VAR_CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_zone_name: ${{ secrets.TF_VAR_CLOUDFLARE_ZONE_NAME }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/deployment/terraform
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: infra/deployment/terraform
        run: terraform destroy -input=false -auto-approve -var-file=prod.tfvars