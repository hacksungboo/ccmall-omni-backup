# .github/workflows/destroy.yml

name: "Terraform Destroy"

on:
  workflow_dispatch: # GitHub Actions 탭에서 수동 실행 버튼 생성

jobs:
  terraform-destroy:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      TF_VAR_onprem_cidr: ${{ secrets.TF_VAR_ONPREM_CIDR }}
      TF_VAR_tailnet_name: ${{ secrets.TF_VAR_TAILNET_NAME }}
      TF_VAR_tailscale_api_key: ${{ secrets.TF_VAR_TAILSCALE_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: infra/deployment/terraform
        run: terraform init -input=false

      - name: Terraform Destroy
        working-directory: infra/deployment/terraform
        run: terraform destroy -input=false -auto-approve